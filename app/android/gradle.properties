org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
# R8 full mode (AGP 8 default) strips generic type signatures that
# flutter_local_notifications' Gson-based scheduled-notification cache needs,
# crashing every cancel()/reschedule call with "TypeToken must be created
# with a type argument" in release builds. Compatibility mode preserves them.
# https://github.com/MaikuB/flutter_local_notifications/issues/2392
android.enableR8.fullMode=false
