name: didiodidi
description: "did I do it or didn't I do it — physical therapy exercise tracker"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.23.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_secure_storage: ^9.2.0
  uuid: ^4.5.0
  crypto: ^3.0.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  http: ^1.2.0
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.23.0
  build_runner: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
